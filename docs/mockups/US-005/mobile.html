<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomeRest — Mappa (Mobile)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css" />
  <style>
    .streets path { stroke: #DCD0B8; fill: none; }
    .streets .major { stroke: #CFC0A4; stroke-width: 5; }
    .streets .minor { stroke: #DCD0B8; stroke-width: 2.5; }
    .streets .alley { stroke: #E5DBC4; stroke-width: 1.5; }
    .area-label {
      font-family: var(--font-sans); font-size: 9px;
      font-weight: 600;
      fill: oklch(0.45 0.05 60);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    /* Smaller pins for mobile demo */
    .mobile-frame .pin .pin-bubble { padding: 5px 10px 5px 7px; font-size: 11px; }
    .mobile-frame .pin .pin-dot { width: 14px; height: 14px; font-size: 9px; }
    .mobile-frame .cluster-bubble { width: 42px; height: 42px; font-size: 15px; border-width: 2px; }
    .mobile-frame .cluster.lg .cluster-bubble { width: 48px; height: 48px; font-size: 17px; }
    .mobile-frame .cluster.sm .cluster-bubble { width: 36px; height: 36px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="mobile-page">
    <h1 class="mobile-caption">Roma in <em>tasca</em></h1>
    <p class="mobile-sub">Trova il bagno più vicino. Anche quando la situazione si fa urgente.</p>

    <div class="mobile-frame">

      <!-- Status bar -->
      <div class="m-statusbar">
        <span>9:41</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h2v-8H2v8zm5 0h2V10H7v12zm5 0h2V6h-2v16zm5 0h2v-4h-2v4zm5 0h2V2h-2v20z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/><rect x="4" y="9" width="13" height="6" rx="0.5" fill="currentColor"/></svg>
        </div>
      </div>

      <!-- Map -->
      <div class="m-map">
        <svg class="streets" viewBox="0 0 420 880" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.6;">
          <!-- River curve -->
          <path d="M -20 200 q 80 60 180 50 t 280 -10" stroke="oklch(0.83 0.05 220)" stroke-width="22" fill="none" opacity="0.5"/>

          <!-- Major arteries -->
          <path class="major" d="M -20 380 C 100 360, 200 420, 320 380 S 460 360, 460 360" />
          <path class="major" d="M 130 -20 L 180 900" />
          <path class="major" d="M 280 -20 L 320 900" />
          <path class="major" d="M -20 600 L 460 600" />

          <!-- Minor -->
          <path class="minor" d="M 60 60 L 90 880" />
          <path class="minor" d="M 380 40 L 410 880" />
          <path class="minor" d="M -20 480 L 460 480" />
          <path class="minor" d="M -20 720 L 460 720" />
          <path class="minor" d="M -20 280 L 460 280" />

          <!-- Alleys -->
          <path class="alley" d="M 200 200 L 240 480" />
          <path class="alley" d="M 100 540 L 200 720" />
          <path class="alley" d="M 320 480 L 380 700" />

          <text class="area-label" x="60" y="320">Trastevere</text>
          <text class="area-label" x="220" y="200">Centro</text>
          <text class="area-label" x="280" y="800">San Giovanni</text>
        </svg>

        <!-- Map green parks -->
        <div style="position:absolute; top:14%; left:12%; width:80px; height:50px; border-radius:50%; background:oklch(0.86 0.07 140); opacity:0.6; filter:blur(2px);"></div>
        <div style="position:absolute; top:60%; left:65%; width:90px; height:60px; border-radius:50%; background:oklch(0.86 0.07 140); opacity:0.6; filter:blur(2px);"></div>
        <div style="position:absolute; top:84%; left:8%; width:70px; height:40px; border-radius:50%; background:oklch(0.86 0.07 140); opacity:0.6; filter:blur(2px);"></div>

        <!-- Me dot -->
        <div class="me-dot" style="left: 50%; top: 48%;"></div>

        <!-- Pins -->
        <div class="pin private selected" style="left: 38%; top: 44%; animation-delay: 60ms;">
          <div class="pin-bubble"><span class="pin-dot">€</span><span>3,50</span></div>
        </div>
        <div class="pin business" style="left: 62%; top: 36%; animation-delay: 120ms;">
          <div class="pin-bubble"><span class="pin-dot">€</span><span>2,00</span></div>
        </div>
        <div class="pin private" style="left: 28%; top: 28%; animation-delay: 180ms;">
          <div class="pin-bubble"><span class="pin-dot">€</span><span>4,00</span></div>
        </div>
        <div class="pin business" style="left: 70%; top: 52%; animation-delay: 240ms;">
          <div class="pin-bubble"><span class="pin-dot">€</span><span>1,80</span></div>
        </div>

        <!-- Clusters -->
        <div class="cluster" style="left: 22%; top: 62%; animation-delay: 300ms;">
          <div class="cluster-bubble">9</div>
        </div>
        <div class="cluster sm" style="left: 78%; top: 22%; animation-delay: 360ms;">
          <div class="cluster-bubble">5</div>
        </div>
        <div class="cluster lg" style="left: 50%; top: 70%; animation-delay: 420ms;">
          <div class="cluster-bubble">14</div>
        </div>
      </div>

      <!-- Top bar -->
      <header class="m-topbar">
        <div class="brand-mark">h</div>
        <div class="brand-name">Home<em>Rest</em></div>
        <button class="auth-btn" title="Accedi">GR</button>
      </header>

      <!-- Filter chips -->
      <div class="m-filters">
        <button class="chip active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          Disponibile ora
        </button>
        <button class="chip">Prossime 2h</button>
        <button class="chip">Tipo</button>
        <button class="chip">Prezzo</button>
        <button class="chip">4★+</button>
      </div>

      <!-- Locate FAB -->
      <button class="m-fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      </button>

      <!-- Bottom sheet preview -->
      <div class="m-sheet">
        <div class="grabber"></div>
        <div class="m-sheet-content">
          <div class="m-sheet-row">
            <div class="m-sheet-photo"></div>
            <div class="m-sheet-info">
              <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:2px;">
                <span class="badge-pill badge-private" style="font-size:10px; padding:2px 7px;">🏠 Privato</span>
              </div>
              <div class="m-sheet-name">Bagno del <em>Cortile</em></div>
              <div class="m-sheet-zone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
                Trastevere · 280 m
              </div>
              <div class="m-sheet-meta">
                <div class="price">3,50<span class="unit">€/h</span></div>
                <span class="rating">
                  <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  4,8
                </span>
              </div>
            </div>
          </div>
          <div class="m-sheet-cta">
            <button class="btn">Dettagli</button>
            <button class="btn btn-accent">
              Prenota
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <p class="mobile-sub" style="margin-top:18px;">Tap su un pin per la card · Tap su un cluster per zoomare</p>
  </div>
</body>
</html>
